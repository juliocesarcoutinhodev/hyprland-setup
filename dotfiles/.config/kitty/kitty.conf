# ==========================================
#  TEMA E FONTE (Mantenha isso)
# ==========================================
include current-theme.conf

font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# ==========================================
#  VISUAL (A Estética)
# ==========================================
# Margem interna (Respiro para o texto não colar na borda)
window_padding_width 5

# Opacidade (Deixa transparente para o Hyprland fazer o blur)
background_opacity 0.80
dynamic_background_opacity yes

# Esconde a barra de título (O Hyprland já cuida disso)
hide_window_decorations yes

# ==========================================
#  CURSOR (A Mágica da Animação)
# ==========================================
# Formato: Beam ( | ) é mais moderno que o Bloco
cursor_shape beam
cursor_beam_thickness 1.5

# O Rastro do Cursor (Cyberpunk style)
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Piscar suavemente
cursor_blink_interval -1

# ==========================================
#  MOUSE & INTERAÇÃO
# ==========================================
# Copiar automaticamente ao selecionar (estilo Linux raiz)
copy_on_select yes

# Não fechar a janela se tiver algo rodando (ex: atualizando sistema)
confirm_os_window_close 1

# Detectar URLs e sublinhar ao passar o mouse
detect_urls yes
underline_hyperlinks hover

# ==========================================
#  ABAS (Tab Bar)
# ==========================================
# Fica lá embaixo
tab_bar_edge bottom

# Estilo Powerline (aquelas setinhas > bonitas)
tab_bar_style powerline
tab_powerline_style slanted

# Título da aba inteligente
tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ==========================================
#  PERFORMANCE
# ==========================================
# Sincronizar com o monitor para evitar "cortes" na tela
sync_to_monitor yes

# Histórico de rolagem (2000 linhas)
scrollback_lines 2000